<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STACK BRANDS</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/logo.png">
  <meta name="description" content="STACK BRANDS. Scale To Acquire Consistent Capital.">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f7f7f7;
      --bg-card: #ffffff;
      --text: #111111;
      --text-secondary: #555555;
      --text-tertiary: #999999;
      --accent: #111111;
      --border: rgba(0,0,0,0.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      background: rgba(247,247,247,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .header-logo {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .header-brand {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--text);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .header-link {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
      letter-spacing: 0.02em;
    }

    .header-link:hover {
      color: var(--text);
    }

    .header-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      color: #ffffff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
      cursor: pointer;
    }

    .header-cta:hover {
      opacity: 0.8;
      transform: translateY(-1px);
    }

    .header-cta svg {
      width: 14px;
      height: 14px;
    }

    /* Main content */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 80px;
      position: relative;
    }

    /* Subtle grid background */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Radial glow */
    .glow {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(0,0,0,0.02) 0%, transparent 70%);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 680px;
      text-align: center;
    }

    .logo-main {
      width: 68px;
      height: 68px;
      object-fit: contain;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    .brand-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: var(--text);
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.15s forwards;
    }

    .headline {
      font-size: clamp(34px, 5.5vw, 52px);
      font-weight: 700;
      line-height: 1.12;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.3s forwards;
    }

    .headline .highlight {
      background: linear-gradient(135deg, #222 0%, #999 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 17px;
      line-height: 1.7;
      color: var(--text-secondary);
      max-width: 460px;
      margin-bottom: 44px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.45s forwards;
    }

    .cta-group {
      display: flex;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.6s forwards;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      font-size: 14px;
      font-weight: 500;
      color: #ffffff;
      background: #111111;
      border: none;
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
    }

    .btn-primary:hover {
      background: #333;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }

    .btn-primary svg {
      width: 16px;
      height: 16px;
    }

    /* Locations */
    .locations {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 72px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.75s forwards;
    }

    .location {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .location-code {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--text-tertiary);
    }

    .location-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #ccc;
    }

    .location-sep {
      width: 40px;
      height: 1px;
      background: var(--border);
    }

    /* Footer */
    footer {
      padding: 24px 40px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-left {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .footer-link {
      font-size: 12px;
      color: var(--text-tertiary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-link:hover {
      color: var(--text-secondary);
    }

    /* Animations */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile */
    @media (max-width: 640px) {
      header {
        padding: 0 20px;
      }

      .header-brand {
        font-size: 11px;
      }

      .header-link {
        display: none;
      }

      main {
        padding: 100px 20px 60px;
      }

      .tagline {
        font-size: 15px;
      }

      footer {
        padding: 20px;
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a href="/" class="header-left" style="text-decoration: none;">
      <img src="/logo.png" alt="STACK BRANDS" class="header-logo">
      <span class="header-brand">STACK BRANDS</span>
    </a>
    <div class="header-right">
      <a href="/about.html" class="header-link">About</a>
      <a href="https://app.stack-brands.com" class="header-cta">
        Command Center
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- Main -->
  <main>
    <div class="grid-bg"></div>
    <div class="glow"></div>

    <div class="content">
      <img src="/logo.png" alt="STACK BRANDS" class="logo-main">
      <div class="brand-name">STACK BRANDS</div>

      <h1 class="headline">
        <span class="highlight">Scale</span> To Acquire<br>
        Consistent Capital
      </h1>

      <p class="tagline">
        Multi-brand e-commerce infrastructure. Automated operations, data-driven scaling, global fulfillment.
      </p>

      <div class="cta-group">
        <a href="https://app.stack-brands.com" class="btn-primary">
          Open Command Center
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </a>
      </div>

      <div class="locations">
        <div class="location">
          <span class="location-code">NL</span>
          <div class="location-dot"></div>
        </div>
        <div class="location-sep"></div>
        <div class="location">
          <span class="location-code">US</span>
          <div class="location-dot"></div>
        </div>
        <div class="location-sep"></div>
        <div class="location">
          <span class="location-code">HK</span>
          <div class="location-dot"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-left">
      &copy; 2026 STACK BRANDS. All rights reserved.
    </div>
    <div class="footer-right">
      <a href="/about.html" class="footer-link">About</a>
      <a href="https://app.stack-brands.com" class="footer-link">Command Center</a>
    </div>
  </footer>

</body>
</html>
